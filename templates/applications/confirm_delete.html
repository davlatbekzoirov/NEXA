{% extends 'base/application_base.html' %}
{% block title %}Confirm Delete · NEXA{% endblock %}
{% block content %}
<div style="max-width:440px; margin:4rem auto; padding:0 1rem">
  <div class="card" style="text-align:center; padding: 2.5rem 2rem; position: relative; overflow: hidden;">
    
    <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--clr-danger);"></div>
    
    <div style="font-size:42px; margin-bottom:1.25rem; filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.3));">
      ⚠️
    </div>
    
    <h2 style="font-size:20px; font-weight: 700; color: #fff; margin-bottom:.75rem; letter-spacing: -0.02em;">
      Remove {{ obj }}?
    </h2>
    
    <p style="color: var(--text-muted); font-size:14px; margin-bottom:2rem; line-height: 1.5;">
      This action is irreversible. It will also delete all documents and scholarships linked to this item.
    </p>
    
    <form method="post" style="display:flex; gap:10px; justify-content:center; align-items:center;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-sm">
        Yes, remove
      </button>
      <a href="{% url 'universities:university_list' %}" class="btn btn-outline btn-sm">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
